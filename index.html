<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌿 EverGreen Garden</title>
    <link rel="stylesheet" href="style.css" />
    <!-- tailwind + daisy UI  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="">
    <h1 class="text-center text-3xl font-bold py-10 text-green-500">
      EverGreen Garden
    </h1>

    <main class="container mx-auto grid grid-cols-12 gap-4">
      <!-- catergory section  -->
      <section id="category-container" class="col-span-3 bg-white shadow-md">
        <div id="button-container" class="flex flex-col gap-2">
          <button
            id="alltrees"
            onclick="fetchPlants()"
            class="btn btn-soft btn-accent active"
          >
            All trees
          </button>
        </div>

        <!-- category button will be added dynamically  -->
      </section>

      <!-- plants card section  -->
      <section
        id="card-container"
        class="col-span-6 grid grid-cols-1 md:grid-cols-3 gap-4"
      >
        <!-- Loader -->
        <div
          id="loading"
          class="flex items-center justify-center z-50 col-span-6 hidden"
        >
          <span class="loading loading-bars loading-xl text-center"></span>
        </div>
      </section>
      <section id="cart-container" class="col-span-3 bg-white shadow-md px-6 py-10">
        <h1 class="text-3xl font-semibold mb-6">Cart</h1>

        <div
          id="cart-list"
          class="bg-gray-200 flex flex-col px-6  py-6 rounded-md gap-4 max-h-150 overflow-y-auto"
        >
        <div id="empty-cart" class="text-center mx-auto"> 
            <p>Your cart is empty <br> Add trees to get started</p>
          </div>
       
          
        </div>
        <div
          class="flex justify-between px-6 py-4 bg-green-200 mt-6 rounded-md"
        >
          <p class="text-2xl font-medium">Total :</p>
          <span id="total" class="text-2xl font-semibold">00</span>
        </div>
      </section>
    </main>

    <script src="./script/loading.js"></script>
    <script src="./script/display.js"></script>
    <script src="./script/cart.js"></script>
    <script src="./script/index.js"></script>
  </body>
</html>
